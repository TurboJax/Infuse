name: Build Infuse versions
on: [push]

jobs:
  build-21:
    runs-on: ubuntu-latest
    env:
      INFUSE_MINECRAFT: 1.21.11
      INFUSE_JVM: 21
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6
      - name: "Running build"
        run: ./gradlew build
      - run: ls ./build/libs
  build-25:
    runs-on: ubuntu-latest
    env:
      INFUSE_MINECRAFT: 26.1.2
      INFUSE_JVM: 25
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6
      - name: "Running build"
        run: ./gradlew build
      - run: ls ./build/libs
