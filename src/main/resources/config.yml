allow_infinite_effects: false

ritual_duration: 600  # Duration in seconds (10 minutes)
ritual_duration_ender: 3600 # Duration in seconds (1hr)

regular_effect_broadcast: true

ritual_beacon: true

empty_effect_icon: true

player_head_drops: true

enable_discord_broadcasts: false

discord_webhook_url: ""

brewing_gui: true

# random = Random effect drops
# 1/2 = Slot 1/2 Drops
# none = None drop
effect_drops: Random

# The number of seconds that it takes for 1 hit to be removed from the hit timer.
# This is primarily used to trigger the "on ten hit" abilities of each effect.
# To trigger them, you need to hit your target 10 times with the specified number of seconds
hit_counter_decay_seconds: 15

join_effects_enabled: false

join_effects: # Same Names from messages.yml
  - ocean
  - emerald
  - fire
  - speed

# First number is the augmented limit, the second is the regular limit
craft_limits:
  emerald:  [1, 3]
  ender:    [1, 3]
  feather:  [1, 3]
  fire:     [1, 3]
  frost:    [1, 3]
  haste:    [1, 3]
  heart:    [1, 3]
  invis:    [1, 3]
  ocean:    [1, 3]
  regen:    [1, 3]
  speed:    [1, 3]
  strength: [1, 3]
  thunder:  [1, 3]
  apophis:  [1, 3]
  thief:    [1, 3]


# Full cooldown is duration + cooldown
