# %player% = Jugador que envía
# %item% = El objeto que se envía
# %x% = Coordenada X
# %y% = Coordenada Y
# %z% = Coordenada Z
# %dimension% = La dimensión

effect_broadcast: "🧪 %player% está preparando %item%<reset> en %x%, %y%, %z%... %dimension%"
